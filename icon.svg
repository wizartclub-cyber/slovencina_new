<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f7468"/>
      <stop offset="1" stop-color="#12544a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- кремова рамка-картка -->
  <rect x="40" y="40" width="432" height="432" rx="64" fill="none" stroke="#f4f1ea" stroke-opacity="0.22" stroke-width="6"/>
  <!-- велике серифне «la» (Langua) -->
  <text x="256" y="300" text-anchor="middle"
        font-family="Iowan Old Style, Palatino, Georgia, 'Times New Roman', serif"
        font-size="232" font-weight="700" fill="#fffdf7" letter-spacing="-4">la</text>
  <!-- золота риска -->
  <rect x="166" y="338" width="180" height="14" rx="7" fill="#d8a24a"/>
  <!-- підпис бренду -->
  <text x="256" y="414" text-anchor="middle"
        font-family="Iowan Old Style, Palatino, Georgia, serif"
        font-size="50" font-weight="600" fill="#f4f1ea" fill-opacity="0.95" letter-spacing="6">LANGUA</text>
</svg>
