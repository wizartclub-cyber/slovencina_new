<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f7468"/>
      <stop offset="1" stop-color="#12544a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- кремова рамка-картка, натяк на флешкартку -->
  <rect x="40" y="40" width="432" height="432" rx="64" fill="none" stroke="#f4f1ea" stroke-opacity="0.22" stroke-width="6"/>
  <!-- велике серифне SK -->
  <text x="256" y="312" text-anchor="middle"
        font-family="Iowan Old Style, Palatino, Georgia, 'Times New Roman', serif"
        font-size="248" font-weight="700" fill="#fffdf7" letter-spacing="-6">SK</text>
  <!-- золота риска -->
  <rect x="176" y="350" width="160" height="14" rx="7" fill="#d8a24a"/>
  <!-- маленький підпис: рідна → ціль -->
  <text x="256" y="424" text-anchor="middle"
        font-family="Iowan Old Style, Palatino, Georgia, serif"
        font-size="44" font-weight="600" fill="#f4f1ea" fill-opacity="0.92">укр → svk</text>
</svg>
